<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Bites - Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar navbar-expand-lg sticky-top shadow-sm custom-header">
    <div class ="container-fluid d-flex justify-content-between align-items-center">
        <a class="navbar-brand position-absolute start-50 translate-middle-x fw-bold text-primary fs-4"href="index.html">HEALTHY BITES</a>
        <div class="d-flex">
        <a class="btn btn-outline-primary fw-bold" href="my_recipes.html">MY RECIPES</a>
        </div>
    </div>
    </header>
    <div class="container-fluid">
        <div class="row">
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block collapse offcanvas-md offcanvas-start border-end" style="min-height: 100vh">
                <div class="position-sticky pt-4">
                    <ul class="nav flex-column fs-5 gap-4">
                        <li class="nav-item">
                           <a class="nav-link text-dark" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                           <a class="nav-link text-dark" href="my_recipes.html">My Recipes</a>
                        </li>
                        <li class="nav-item">
                           <a class="nav-link text-dark" href="trending_meals.html">Trending Meals</a>
                        </li>
                        <li class="nav-item">
                          <a class="nav-link active fw-bold text-primary" aria-current="page" href="all_recipes.html">All Recipes</a>
                        </li>
                        <li class="nav-item">
                           <a class="nav-link text-dark" href="meal_compare.html">Meal Comparison</a>
                        </li>
                    </ul>
                </div>
            </nav>      
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-5">

        <div class="pb-2 mb-4 border-bottom">
            <h1 class="h2 text-primary">Welcome to All Recipes</h1>
        </div>
       <div class="row">
          <aside class="col-lg-3 mb-4">
            <div class="bg-light p-4 border border-primary border-opacity-25">
                <h4 class="h5 mb-3 text-primary fw-bold">Filter Recipes</h4>

            <div class="mb-4">
                <h6 class="fw-bold">Dietary Information</h6>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="V" id="checkVeg">
                    <label class="form-check-label" for="checkVeg">Vegetarian (V)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="G" id="checkGlu">
                    <label class="form-check-label" for="checkGlu">Gluten-Free (G)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="H" id="checkHalal">
                    <label class="form-check-label" for="checkHalal">Halal (H)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="HP" id="checkHighProtein">
                    <label class="form-check-label" for="checkHighProtein">High Protein (HP)</label>
                </div>
            </div>
            <div class="mb-4">
                <h6 class="fw-bold">Meals</h6>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="B" id="checkBreak">
                    <label class="form-check-label" for="checkBreak">Breakfast (B)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="L" id="checkLunch">
                    <label class="form-check-label" for="checkLunch">Lunch (L)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="D" id="checkDinner">
                    <label class="form-check-label" for="checkDinner">Dinner (D)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="S" id="checkSnack">
                    <label class="form-check-label" for="checkSnack">Snack (S)</label>
                </div>
            </div>
            <div class="mb-4">
                <h6 class="fw-bold">Duration</h6>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="15" id="check15">
                    <label class="form-check-label" for="check15">15 mins</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="30" id="check30">
                    <label class="form-check-label" for="check30">30 mins</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="60" id="check60">
                    <label class="form-check-label" for="check60">60 mins</label>
                </div>
            </div>

            <button class="btn btn-primary w-100 mt-2">Apply Filters</button>
            </div>
          </aside>

          <div class="col-lg-9">

            <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">

                <div class="col">
                    <div class="card h-100 shadow-sm">
                        <div class="bg-secondary bg-opacity-25 d-flex justify-content-between align-items-center rounded-top" style="height: 200px">
                            <span class="text-muted">Image here</span>
                        </div>
                        <div class="card-body">
                        <span class="badge bg-success">V</span>
                        <span class="badge bg-info text-dark">15 mins</span>
                        <span class="badge bg-info text-dark">Snack</span>
                        <h5 class="card-title fw-bold">Ricecakes</h5>
                    </div>
                    </div>
                </div>
            </div>
          </div>
       </div>
    </main>
        </div> 
    </div> 
</body>

</html>
